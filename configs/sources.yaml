# ニュースソース設定
# G20+地域代表国への拡張を見越して、国・媒体・RSS URLをここで一元管理する
#
# フィールド説明:
#   country        : ISO 3166-1 alpha-2 または "Global"
#   name           : 媒体名（ファイル名に使うので英数字推奨）
#   category       : general / economy / technology / politics / sports
#   rss_url        : RSS/Atom フィード URL
#   priority       : 同一国内での優先度（低い数値 = 高優先）
#   enabled        : false にすると取得対象から除外
#   language       : ISO 639-1 言語コード (ja / en / ar / zh / fr / de / ...)
#   region         : 地域区分 (japan / global / middle_east / europe / east_asia / global_south)
#   source_type    : メディア種別 (public_broadcaster / wire_service / newspaper /
#                    broadcast_news / state_media / digital_native)
#   bridge_source  : 英語だが特定地域視点を代表する媒体は true
#   licensing_notes: 取得・利用条件に関する注記
#
# 取得成功率メモ（2026-04時点の確認状況）:
#   NHK*          : 安定（公式フィード、更新頻度高）
#   Nikkei        : wor.jp 経由・第三者RDF。準公式的に機能しているが公式ではない
#   Asahi         : 公式RDF。安定
#   Kyodo47       : 47news.jp 経由（共同通信配信）。2026-04確認: HTTP 404 で取得不可
#   Reuters       : Google News経由。feeds.reuters.com 廃止のためこの経路のみ現実的
#   APNews        : Google News経由。直接RSSなし
#   BBC           : 公式フィード。安定
#   Bloomberg     : Google News経由。直接RSSは有料会員向け
#   FT            : 公式RSSだがフィード内容は要約のみ（全文なし）
#   AlJazeera     : 公式RSS。安定（2026-04確認済み）
#   France24      : 公式RSS（English）。安定
#   CNA           : Google News経由（直接RSSの安定性が低いため）

sources:
  # ── Japan ────────────────────────────────────────────────────────────────
  - country: JP
    name: NHK
    category: general
    rss_url: https://www3.nhk.or.jp/rss/news/cat0.xml
    priority: 1
    enabled: true
    language: ja
    region: japan
    source_type: public_broadcaster
    bridge_source: false
    licensing_notes: "公式フィード。個人・研究利用は問題なし。商用利用・転載は別途確認要。"

  - country: JP
    name: NHK_Politics
    category: politics
    # NHK 政治カテゴリ専用フィード。一般フィードと重複する場合があるが、
    # 政治ニュースの取得密度を上げるために追加。event_builderでURLデdup済み。
    rss_url: https://www3.nhk.or.jp/rss/news/cat4.xml
    priority: 2
    enabled: true
    language: ja
    region: japan
    source_type: public_broadcaster
    bridge_source: false
    licensing_notes: "公式フィード。個人・研究利用は問題なし。商用利用・転載は別途確認要。"

  - country: JP
    name: NHK_Economy
    category: economy
    # NHK 経済カテゴリ専用フィード。日銀・金融・貿易関連の JP 記事密度向上に寄与。
    rss_url: https://www3.nhk.or.jp/rss/news/cat6.xml
    priority: 3
    enabled: true
    language: ja
    region: japan
    source_type: public_broadcaster
    bridge_source: false
    licensing_notes: "公式フィード。個人・研究利用は問題なし。商用利用・転載は別途確認要。"

  - country: JP
    name: Nikkei
    category: economy
    # 公式RSSは廃止済み。wor.jp 経由の第三者RDFフィードを使用
    rss_url: https://assets.wor.jp/rss/rdf/nikkei/news.rdf
    priority: 4
    enabled: true
    language: ja
    region: japan
    source_type: newspaper
    bridge_source: false
    licensing_notes: "wor.jp 経由の第三者RDF。公式サポート外。取得はできているが、利用継続可否は定期確認が必要。"

  - country: JP
