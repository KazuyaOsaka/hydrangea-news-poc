  - country: JP
    name: Kyodo47
    category: general
    # 共同通信（共同配信）の記事を 47news.jp 経由で取得。
    # 2026-04-03 確認: https://www.47news.jp/rss/47news.rss → HTTP 404 で取得不可。
    # 代替候補: https://www.47news.jp/rss のパス変更、または Google News 経由
    #   (https://news.google.com/rss/search?q=kyodoonline.co.jp+when:24h&ceid=JP:ja)
    # 有効化する前に取得確認が必要。
    rss_url: https://www.47news.jp/rss/47news.rss
    priority: 6
    enabled: false
    language: ja
    region: japan
    source_type: wire_service
    bridge_source: false
    licensing_notes: "共同通信配信。直接利用は著作権上問題あり。RSS取得も現在404で停止中。"

