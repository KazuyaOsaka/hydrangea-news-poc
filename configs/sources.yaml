    priority: 1
    enabled: true
    language: en
    region: middle_east
    source_type: broadcast_news
    bridge_source: true
    licensing_notes: >
      公式RSSフィード。Al Jazeeraはカタール政府系だが英語版は国際報道機関として広く参照される。
      RSS取得・研究目的は許容範囲。商用利用・記事転載はAl Jazeera Media Networkへの確認要。

