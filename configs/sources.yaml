  # ── Middle East (Pilot) ────────────────────────────────────────────────
  - country: QA
    name: AlJazeera
    category: general
    # Al Jazeera English 公式RSS。中東・グローバルサウス視点の英語報道。
    # カタール国営放送だが、英語版は中東・アフリカ・アジアをカバーする国際報道機関として機能。
    # 欧米メディアとは異なる視点（中東・パレスチナ・グローバルサウス）を代表するブリッジソース。
    rss_url: https://www.aljazeera.com/xml/rss/all.xml
    priority: 1
    enabled: true
    language: en
    region: middle_east
    source_type: broadcast_news
    bridge_source: true
    licensing_notes: >
      公式RSSフィード。Al Jazeeraはカタール政府系だが英語版は国際報道機関として広く参照される。
      RSS取得・研究目的は許容範囲。商用利用・記事転載はAl Jazeera Media Networkへの確認要。

