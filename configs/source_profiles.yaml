# Source Authority Profiles
# 出典権威プロファイル — スクリプト内での媒体名言及に使用
#
# フィールド説明:
#   source_name              : sources.yaml の name と一致させること
#   display_name_ja          : 日本語表示名 (旧フィールド、後方互換)
#   country                  : ISO 3166-1 alpha-2 または "Global"
#   region                   : sources.yaml の region と一致
#   language                 : ja / en / it / zh
#   authority_tier           : top / major / standard
#     top      — 世界的プレステージ、高い名前認知度 (Reuters, FT, Bloomberg, Nikkei)
#     major    — 強い地域・分野権威 (BBC, AlJazeera, France24, CNA, NHK)
#     standard — 信頼できる地域メディア (Asahi, APNews)
#   mention_style_short      : 短い言及形 (DEPRECATED: F-8-1-A 以降は display_name_speech を使う。後方互換のため残す。F-12 完了後に削除予定)
#   mention_style_long       : 長い文脈形 (arbitrage_gap / fact セクション向け)
#   can_authority_mention    : true → スクリプトで媒体名を明示してよい
#
# F-8-1-A で追加された 3層表示名:
#   display_name_speech      : 台本発話用 (例: "独高級ニュース誌のシュピーゲル")
#   display_name_article     : 記事用 (例: "独高級誌・Der Spiegel(シュピーゲル)")
#   display_name_subtitle    : 字幕・テロップ用 (原語ベース、例: "Der Spiegel")
#   requires_political_warning : Tier 3 媒体は true。台本生成時に政治的立場を強調する
#
# Tier 3 警告補強フィールド (任意、Tier 3 媒体のみ設定):
#   state_aligned    : 政府系メディアか
#   parent_company   : 親会社・運営組織
#   funding_sources  : 主要資金源リスト
#   warning_note     : 政治的警告の詳細注記
#
# 重要: evidence.json に存在するソースのみ言及すること。
#        このファイルは言及「許可」リストであり、言及「根拠」ではない。

